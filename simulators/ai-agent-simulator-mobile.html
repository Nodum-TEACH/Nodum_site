<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Agent - Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #030712;
            color: #f9fafb;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            padding: 16px;
        }
        .chat-container {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 16px;
            max-height: 60vh;
            overflow-y: auto;
            margin-bottom: 16px;
        }
        .message {
            padding: 12px 16px;
            border-radius: 16px;
            margin-bottom: 12px;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        .message-bot {
            background: #1f2937;
            border-bottom-left-radius: 4px;
        }
        .message-user {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-bottom-right-radius: 4px;
            margin-left: auto;
            max-width: 85%;
        }
        .source {
            font-size: 0.75rem;
            color: #9ca3af;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn {
            background: rgba(59,130,246,0.1);
            border: 1px solid rgba(59,130,246,0.3);
            color: #60a5fa;
            padding: 16px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }
        .btn:active {
            background: rgba(59,130,246,0.2);
            transform: scale(0.98);
        }
        .typing {
            display: flex;
            gap: 4px;
            padding: 12px;
        }
        .typing span {
            width: 8px;
            height: 8px;
            background: #9ca3af;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%,80%,100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="chat-container" id="chat">
        <div class="message message-bot">
            Привет! Задайте вопрос — найду ответ в документе.
        </div>
    </div>

    <div class="buttons">
        <button class="btn" onclick="ask(0)">Гарантия на насосы?</button>
        <button class="btn" onclick="ask(1)">Срок поставки?</button>
        <button class="btn" onclick="ask(2)">Характеристики?</button>
        <button class="btn" onclick="ask(3)">Как часто ТО?</button>
    </div>

    <script>
        const questions = [
            { q: "Какая гарантия на насосы?", a: "Гарантийный срок — 24 месяца с даты ввода в эксплуатацию.", source: "§1 Регламента" },
            { q: "Срок поставки в Сургут?", a: "Логистика до ХМАО занимает 3-5 рабочих дней.", source: "§2 Регламента" },
            { q: "Характеристики насоса?", a: "Мощность: 15 кВт. Производительность: до 120 м³/час.", source: "§3 Регламента" },
            { q: "Как часто ТО?", a: "Плановое ТО — каждые 6 месяцев. Выезд специалиста бесплатный.", source: "§4 Регламента" }
        ];

        let isTyping = false;

        function ask(idx) {
            if (isTyping) return;
            isTyping = true;

            const chat = document.getElementById('chat');
            const item = questions[idx];

            // User message
            chat.innerHTML += `<div class="message message-user">${item.q}</div>`;
            chat.scrollTop = chat.scrollHeight;

            // Typing indicator
            const typingId = 'typing-' + Date.now();
            chat.innerHTML += `<div class="message message-bot" id="${typingId}"><div class="typing"><span></span><span></span><span></span></div></div>`;
            chat.scrollTop = chat.scrollHeight;

            setTimeout(() => {
                document.getElementById(typingId).innerHTML = `${item.a}<div class="source">📄 ${item.source}</div>`;
                chat.scrollTop = chat.scrollHeight;
                isTyping = false;
            }, 1500);
        }
    </script>
</body>
</html>
